name: CI

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Enforce publishing rules
              run: npm run check

            - name: Build plugin
              run: npm run build
