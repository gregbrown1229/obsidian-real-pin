name: Release Obsidian plugin

on:
    push:
        tags:
            - '[0-9]*'

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write # create the release and upload assets
            id-token: write # OIDC token for signing the provenance attestation
            attestations: write # record the build provenance attestation
        steps:
            - uses: actions/checkout@v7

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Enforce publishing rules (incl. release tag)
              run: |
                  npm run check
                  node scripts/validate-plugin.mjs --release-tag "${GITHUB_REF#refs/tags/}"

            - name: Build plugin
              run: npm run build

            - name: Attest build provenance
              uses: actions/attest-build-provenance@v4
              with:
                  subject-path: main.js

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --generate-notes \
                    --draft \
                    main.js manifest.json styles.css
